name: Monthly realtime snapshot

# Pull ~18 mo of BC realtime water-temp data from ECCC via tidyhydat /
# ngr::ngr_hyd_realtime and write a partitioned parquet snapshot to
# s3://water-temp-bc/data/realtime/<yyyy>/<mm>/snapshot_<yyyy-mm-dd>.parquet.
#
# Authenticates via OIDC against role_gha_water_temp_bc, provisioned by
# NewGraphEnvironment/rtj#147. Trust is scoped to main branch only.

on:
  schedule:
    # 1st of the month, 12:00 UTC. GitHub may delay scheduled runs under load.
    - cron: '0 12 1 * *'
  workflow_dispatch:

permissions:
  id-token: write   # OIDC token for AWS
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    # Local serial pull is ~40-90 min depending on ECCC responsiveness.
    timeout-minutes: 150

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::sessioninfo

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::414155577829:role/role_gha_water_temp_bc
          aws-region: us-west-2

      - name: Pull snapshot
        run: Rscript scripts/snapshot.R

      - name: Upload to S3
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          files=(data/realtime/**/snapshot_*.parquet)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No snapshot file produced under data/realtime/" >&2
            exit 1
          fi
          if [ ${#files[@]} -gt 1 ]; then
            echo "Multiple snapshot files found; expected exactly one:" >&2
            printf '  %s\n' "${files[@]}" >&2
            exit 1
          fi
          FILE="${files[0]}"
          DEST="s3://water-temp-bc/${FILE}"
          echo "Uploading ${FILE} -> ${DEST}"
          aws s3 cp "$FILE" "$DEST"

      - name: Session info
        if: always()
        run: Rscript -e 'sessioninfo::session_info()'
